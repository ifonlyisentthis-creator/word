name: Keepalive

on:
  schedule:
    - cron: "0 12 1 */2 *"   # 1st of every other month at noon UTC (~every 50 days)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Touch keepalive file
        run: |
          date -u > .github/.keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive [skip ci]"
          git push
